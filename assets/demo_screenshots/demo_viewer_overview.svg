<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Demo viewer overview</title>
  <desc id="desc">Neutral diagram showing a local video placeholder, predicted ad intervals, skip button, and timeline bar.</desc>
  <rect width="1200" height="720" fill="#f6f7f9"/>
  <rect x="64" y="56" width="1072" height="608" rx="6" fill="#ffffff" stroke="#d8dde6" stroke-width="2"/>

  <text x="96" y="118" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#202733">Public Demo Viewer</text>
  <text x="96" y="150" font-family="Arial, sans-serif" font-size="18" fill="#667085">Structure preview without raw YouTube video frames</text>

  <rect x="96" y="192" width="620" height="350" rx="6" fill="#202733"/>
  <rect x="128" y="224" width="556" height="286" rx="4" fill="#303846" stroke="#596273" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="238" y="348" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#f3f6fb">Local video placeholder</text>
  <text x="257" y="386" font-family="Arial, sans-serif" font-size="18" fill="#c6ceda">No original video is included</text>

  <rect x="548" y="242" width="120" height="46" rx="6" fill="#f4b000"/>
  <text x="590" y="272" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#1d2330">Skip</text>

  <rect x="754" y="192" width="360" height="350" rx="6" fill="#f8fafc" stroke="#d8dde6" stroke-width="2"/>
  <text x="790" y="240" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#202733">Predicted ad intervals</text>
  <rect x="790" y="282" width="278" height="56" rx="5" fill="#fff7d6" stroke="#e2b72f"/>
  <text x="812" y="317" font-family="Arial, sans-serif" font-size="18" fill="#202733">Ad segment 121.5s-157.0s</text>
  <rect x="790" y="362" width="278" height="56" rx="5" fill="#e9f5ff" stroke="#76a9df"/>
  <text x="812" y="397" font-family="Arial, sans-serif" font-size="18" fill="#202733">Boundary review required</text>
  <rect x="790" y="442" width="278" height="56" rx="5" fill="#eef7ee" stroke="#7bb77e"/>
  <text x="812" y="477" font-family="Arial, sans-serif" font-size="18" fill="#202733">Sample metrics panel</text>

  <text x="96" y="596" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#202733">Timeline</text>
  <rect x="96" y="618" width="1018" height="28" rx="4" fill="#d9dee8"/>
  <rect x="356" y="618" width="160" height="28" rx="4" fill="#f4b000"/>
  <rect x="728" y="618" width="198" height="28" rx="4" fill="#f4b000"/>
  <line x1="640" y1="604" x2="640" y2="660" stroke="#202733" stroke-width="3"/>
  <text x="340" y="592" font-family="Arial, sans-serif" font-size="15" fill="#667085">Ad segment 121.5s-157.0s</text>
  <text x="96" y="678" font-family="Arial, sans-serif" font-size="15" fill="#667085">Actual demo files use synthetic public sample manifest and metrics.</text>
</svg>
